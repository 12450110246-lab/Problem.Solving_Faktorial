<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Faktorial Interaktif</title>

<style>

/* Background animasi */
body{
font-family:Arial;
height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(270deg,#667eea,#764ba2,#6dd5fa);
background-size:600% 600%;
animation:bgAnim 10s infinite alternate;
}

/* animasi background */
@keyframes bgAnim{
0%{background-position:left;}
100%{background-position:right;}
}

/* card utama */
.container{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
padding:35px;
border-radius:20px;
width:420px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
color:white;
}

/* judul */
h2{
margin-bottom:20px;
}

/* input */
input{
width:90%;
padding:12px;
font-size:16px;
border:none;
border-radius:8px;
margin-bottom:15px;
}

/* tombol */
button{
padding:10px 18px;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
margin:5px;
}

.hitung{
background:#22c55e;
color:white;
}

.reset{
background:#ef4444;
color:white;
}

button:hover{
transform:scale(1.08);
}

/* hasil */
#hasil{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

/* langkah */
#langkah{
margin-top:10px;
font-size:16px;
}

/* animasi angka */
.number-animation{
font-size:28px;
margin-top:10px;
animation:pop 0.5s;
}

@keyframes pop{
0%{transform:scale(0);}
100%{transform:scale(1);}
}

</style>
</head>

<body>

<div class="container">

<h2>🧮 Kalkulator Faktorial Modern</h2>

<input 
type="number"
id="angka"
placeholder="Masukkan angka"
onkeypress="enterHitung(event)"
>

<br>

<button class="hitung" onclick="hitungFaktorial()">Hitung</button>
<button class="reset" onclick="resetData()">Reset</button>

<div id="langkah"></div>
<div id="hasil"></div>
<div id="animasi"></div>

</div>

<script>

/* fungsi menghitung faktorial */
function hitungFaktorial(){

let angka=parseInt(document.getElementById("angka").value);

/* validasi */
if(isNaN(angka)){
alert("Masukkan angka terlebih dahulu!");
return;
}

if(angka<0){
alert("Faktorial tidak untuk angka negatif");
return;
}

let hasil=1;
let langkah="";

/* loop perhitungan */
for(let i=angka;i>=1;i--){

hasil*=i;

langkah+=i;

if(i>1){
langkah+=" × ";
}

}

/* tampilkan langkah */
document.getElementById("langkah").innerHTML=
"Perhitungan: "+langkah;

/* tampilkan hasil */
document.getElementById("hasil").innerHTML=
"✅ Hasil Faktorial = "+hasil;

/* animasi angka */
document.getElementById("animasi").innerHTML=
"<div class='number-animation'>"+hasil+"</div>";

}

/* reset */
function resetData(){

document.getElementById("angka").value="";
document.getElementById("hasil").innerHTML="";
document.getElementById("langkah").innerHTML="";
document.getElementById("animasi").innerHTML="";

}

/* enter untuk hitung */
function enterHitung(event){

if(event.key==="Enter"){
hitungFaktorial();
}

}

</script>

</body>
</html>
